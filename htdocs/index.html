<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>津田沼駅周辺ガイド</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>津田沼駅周辺ガイド</h1>
        <nav>
            <ul>
                <li><a href="#restaurants">飲食店</a></li>
                <li><a href="#supermarkets">スーパー</a></li>
                <li><a href="#parks">公園</a></li>
            </ul>
        </nav>
    </header>
    
    <section id="restaurants">
        <h2>飲食店</h2>
        <div class="content">
            <article>
                <h3>イタリアンレストラン「トラットリア・ダ・ジョルジオ」</h3>
                <p>本格的なイタリアンが楽しめるお店です。</p>
            </article>
            <article>
                <h3>寿司屋「鮨乃佐藤」</h3>
                <p>新鮮な魚を使った寿司を提供するお店です。</p>
            </article>
        </div>
    </section>
    
    <section id="supermarkets">
        <h2>スーパー</h2>
        <div class="content">
            <article>
                <h3>イトーヨーカドー 津田沼店</h3>
                <p>新鮮な食材が豊富で便利なスーパーです。</p>
            </article>
            <article>
                <h3>マルエツ 津田沼店</h3>
                <p>地元の人々に親しまれているスーパーです。</p>
            </article>
        </div>
    </section>

    <section id="parks">
        <h2>公園</h2>
        <div class="content">
            <article>
                <h3>津田沼公園</h3>
                <p>広い芝生があり、家族連れに人気の公園です。</p>
            </article>
            <article>
                <h3>大久保公園</h3>
                <p>散歩に最適な場所で、静かな環境が魅力です。</p>
            </article>
        </div>
    </section>
    
    <footer>
        <p>&copy; 2024 津田沼駅周辺ガイド</p>
    </footer>
</body>
</html>
