<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="津田沼のスポットガイド">
    <title>津田沼のスポットガイド</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="fade-in">
        <div class="logo">
            <h1>津田沼のスポットガイド</h1>
        </div>
        <nav>
            <ul>
                <li><a href="#restaurants">飲食店</a></li>
                <li><a href="#parks">公園</a></li>
                <li><a href="#supermarkets">スーパー</a></li>
            </ul>
        </nav>
    </header>

    <section id="restaurants" class="fade-in">
        <div class="section-box">
            <div class="section-title">
                <h2>飲食店</h2>
            </div>
            <div class="card-container">
                <div class="card">
                    <img src="S__30130380.jpg" alt="元氣焼肉 牛繁">
                    <h3>元氣焼肉 牛繁</h3>
                    <p>食べ放題があり、料金も安くお腹を満たすことが出来る</p>
                </div>
                <div class="card">
                    <img src="restaurant2.jpg" alt="東京油組総本店 津田沼組">
                    <h3>東京油組総本店 津田沼組</h3>
                    <p>フレンチをベースにしたモダンな料理。</p>
                </div>
            </div>
        </div>
    </section>

    <section id="parks" class="fade-in">
        <div class="section-box">
            <div class="section-title">
                <h2>公園</h2>
            </div>
            <div class="card-container">
                <div class="card">
                    <img src="park1.jpg" alt="津田沼公園">
                    <h3>津田沼公園</h3>
                    <p>自然に囲まれた広い公園。</p>
                </div>
                <div class="card">
                    <img src="park2.jpg" alt="谷津奏の杜公園">
                    <h3>谷津奏の杜公園</h3>
                    <p>四季折々の花を楽しめる公園。</p>
                </div>
            </div>
        </div>
    </section>

    <section id="supermarkets" class="fade-in">
        <div class="section-box">
            <div class="section-title">
                <h2>スーパー</h2>
            </div>
            <div class="card-container">
                <div class="card">
                    <img src="supermarket1.jpg" alt="スーパー1">
                    <h3>スーパー A</h3>
                    <p>新鮮な食材が揃うスーパー。</p>
                </div>
                <div class="card">
                    <img src="supermarket2.jpg" alt="スーパー2">
                    <h3>スーパー B</h3>
                    <p>24時間営業の便利なスーパー。</p>
                </div>
            </div>
        </div>
    </section>

    <footer class="fade-in">
        <p>© 2024 津田沼スポットガイド</p>
    </footer>

</body>
</html>
