<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="津田沼のスポットガイド">
    <img src="82124.jpg" alt="津田沼駅" width="1100" height="300">
    <title>津田沼のスポットガイド</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="fade-in">
        <div class="logo">
            <h1>津田沼のスポットガイド</h1>
        </div>
        <nav>
            <ul>
                <li><a href="#restaurants">飲食店</a></li>
                <li><a href="#parks">公園</a></li>
                <li><a href="#supermarkets">スーパー</a></li>
            </ul>
        </nav>
    </header>

    <section id="restaurants" class="fade-in">
        <div class="section-box">
            <div class="section-title">
                <a href="insyokuten.html"><h2>飲食店</h2></a>
            </div>
            <div class="card-container">
                <div class="card">
                    <a href="insyokuten.html"><h3>元氣焼肉 牛繁</h3></a>
                    <p>食べ放題があり、料金も安くお腹を満たすことが出来る</p>
                </div>
                <div class="card">
                    <a href="insyokuten.html"><h3>東京油組総本店 津田沼組</h3></a>
                    <p>味が濃く、がっつり食べたい人にオススメ！</p>
                </div>
            </div>
        </div>
    </section>

    <section id="parks" class="fade-in">
        <div class="section-box">
            <div class="section-title">
                <h2>公園</h2>
            </div>
            <div class="card-container">
                <div class="card">
                    <h3>キャロット公園</h3>
                    <p>住宅街に囲まれていて、休憩スポットにも最適</p>
                </div>
                <div class="card">
                    <h3>谷津奏の杜公園</h3>
                    <p>とにかく広く、子供を遊ばせるならここ！</p>
                </div>
            </div>
        </div>
    </section>

    <section id="supermarkets" class="fade-in">
        <div class="section-box">
            <div class="section-title">
                <h2>スーパー</h2>
            </div>
            <div class="card-container">
                <div class="card">
                    <h3>スーパー A</h3>
                    <p>新鮮な食材が揃うスーパー。</p>
                </div>
                <div class="card">
                    <h3>スーパー B</h3>
                    <p>24時間営業の便利なスーパー。</p>
                </div>
            </div>
        </div>
    </section>

    <footer class="fade-in">
        <p>© 2024 津田沼スポットガイド</p>
    </footer>

</body>
</html>
