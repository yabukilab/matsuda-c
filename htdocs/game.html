<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset='utf-8' />
    <title>ランキングトップ3</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f8f8;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #ffcc00;
        }
        .rank {
            background: #fff;
            margin: 20px 0;
            padding: 15px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }
        h2 {
            margin: 0;
            color: #e92db0;
        }
        img {
            width: 300px; 
            height: auto; 
            border-radius: 5px; 
            margin: 10px 0; 
        }
        p {
            font-size: 24px;
            margin: 5px 0;
        }
    </style>
</head>

<body>
    <h1>ランキングトップ3</h1>

    <div class="rank">
        <h2>1位: <a href="https://example.com/item1">商品名1</a></h2>
        <img src="image1.jpg" alt="商品名1">
        <p>商品の説明や特徴をここに書きます。</p>
    </div>
    
    <div class="rank">
        <h2>2位: <a href="https://example.com/item2">アピナ津田沼</a></h2>
        <img src="image2.jpg" alt="商品名2">
        <p>商品の説明や特徴をここに書きます。</p>
    </div>
    
    <div class="rank">
        <h2>3位: <a href="https://example.com/item3">シルクハット津田沼</a></h2>
        <img src="image3.jpg" alt="商品名3">
        <p>商品の説明や特徴をここに書きます。</p>
    </div>

</body>
</html>
